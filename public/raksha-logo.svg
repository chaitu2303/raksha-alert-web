<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B3A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C41E3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C41E3A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield body -->
  <path d="M 100 15 L 155 50 L 155 130 Q 155 180 100 210 Q 45 180 45 130 L 45 50 Z" fill="url(#shieldGrad)" stroke="#1a365d" stroke-width="1.5"/>
  
  <!-- Shield accent border -->
  <path d="M 100 15 L 155 50 L 155 130 Q 155 175 100 205" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.8"/>
  
  <!-- Supporting hands -->
  <g opacity="0.85">
    <!-- Left hand -->
    <path d="M 75 165 Q 65 165 60 175 Q 58 185 65 190" fill="#1a365d" stroke="#1a365d" stroke-width="0.5"/>
    <!-- Right hand -->
    <path d="M 125 165 Q 135 165 140 175 Q 142 185 135 190" fill="#1a365d" stroke="#1a365d" stroke-width="0.5"/>
  </g>
  
  <!-- Alert eye symbol -->
  <g transform="translate(100, 95)">
    <!-- Outer eye shape -->
    <ellipse cx="0" cy="0" rx="22" ry="28" fill="#C41E3A" opacity="0.95"/>
    <!-- Eye iris -->
    <circle cx="0" cy="5" r="14" fill="#FF6B35"/>
    <!-- Eye pupil -->
    <circle cx="0" cy="5" r="7" fill="#1a365d"/>
    <!-- Eye shine/highlight -->
    <circle cx="-3" cy="2" r="2.5" fill="white"/>
  </g>
  
  <!-- Center accent dot on shield -->
  <circle cx="100" cy="220" r="2" fill="#FF6B35" opacity="0.7"/>
</svg>